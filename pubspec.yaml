name: bill_scanner_app
description: A smart bill scanner and expense tracker app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  google_generative_ai: ^0.4.3
  permission_handler: ^11.3.1
  timezone: ^0.9.2
  
  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Env Variables
  flutter_dotenv: ^5.1.0

  # Charts
  fl_chart: ^0.68.0

  # Image Input
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # OCR
  google_mlkit_text_recognition: ^0.13.0

  # Firebase
  firebase_core: ^2.30.0
  firebase_storage: ^11.7.0
  cloud_firestore: ^4.17.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

  # PDF
  
  # File handling
  file_picker: ^8.0.0
  path_provider: ^2.1.3

  # Notifications
  flutter_local_notifications: ^17.1.2
  pdf_render_plus: 1.4.16

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

  
flutter:
  uses-material-design: true
  assets:
    - .env
